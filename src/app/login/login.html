
<form action="">
    <div class="form-group">
        <label for="email">Email address</label>
        <input [(ngModel)]="email" type="email" class="form-control" [ngModelOptions]="{standalone: true}" id="email" placeholder="Enter email">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input [(ngModel)]="password" type="password" class="form-control" id="password" [ngModelOptions]="{standalone: true}" placeholder="Password">
    </div>
    <button type="submit" (click)="giveaccess()" class="btn btn-primary">Submit</button>
</form>
